name = "mineralwatch-contact"
main = "contact-worker.js"
compatibility_date = "2024-01-01"

# Custom domain routing (add this route after deploying)
# routes = [
#   { pattern = "api.mymineralwatch.com/contact", zone_name = "mymineralwatch.com" }
# ]

# Environment variables - set these as secrets in Cloudflare dashboard
# Run: wrangler secret put POSTMARK_API_KEY
# Run: wrangler secret put NOTIFY_EMAIL  
# Run: wrangler secret put FROM_EMAIL
# Run: wrangler secret put MINERAL_AIRTABLE_API_KEY
# Run: wrangler secret put AIRTABLE_BASE_ID
# Run: wrangler secret put AIRTABLE_TABLE_ID
# Run: wrangler secret put AIRTABLE_DEMO_TABLE_ID  (optional, defaults to tblDqFremDUvpOW7l)

[[kv_namespaces]]
binding = "MINERAL_CACHE"
id = "3ca36f1a976e4dd89d65bceb4d4e3f75"

[[d1_databases]]
binding = "DB"
database_name = "oklahoma-wells"
database_id = "9afdff90-6719-46dd-97d2-6ca3777b17c9"

[vars]
# Non-sensitive vars can go here
# NOTIFY_EMAIL = "support@mymineralwatch.com"
# FROM_EMAIL = "noreply@mymineralwatch.com"
